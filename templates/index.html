<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Research Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a1a;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        header span {
            font-size: 12px;
            color: #666;
        }

        #clear-btn {
            background: #2a2a2a;
            color: #999;
            border: 1px solid #333;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        #clear-btn:hover { background: #333; color: #fff; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .user-message {
            background: #1e3a5f;
            color: #e0e0e0;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .agent-message {
            background: #1a1a1a;
            color: #e0e0e0;
            align-self: flex-start;
            border: 1px solid #2a2a2a;
            border-bottom-left-radius: 4px;
        }

        .thinking {
            color: #666;
            font-style: italic;
            font-size: 13px;
        }

        #input-area {
            padding: 16px 24px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #user-input:focus { border-color: #4a9eff; }

        #send-btn {
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            align-self: flex-end;
        }

        #send-btn:hover { background: #3a8eef; }
        #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: #0f0f0f; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <h1>🤖 Agentic Research Assistant</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span>LangGraph · ReAct · Grok</span>
        <button id="clear-btn" onclick="clearMemory()">Clear Chat</button>
    </div>
</header>

<div id="chat-container">
    <div class="message agent-message">
        Hello! I'm your research assistant. I can search the web, execute Python code, and look up documents. What would you like to explore?
    </div>
</div>

<div id="input-area">
    <textarea
        id="user-input"
        placeholder="Ask me anything... (Shift+Enter for new line, Enter to send)"
        rows="1"
        onkeydown="handleKeydown(event)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Auto-resize textarea as user types
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    function handleKeydown(e) {
        // Enter sends, Shift+Enter adds new line
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function addMessage(content, type) {
        const div = document.createElement('div');
        div.className = `message ${type}-message`;
        div.textContent = content;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message || sendBtn.disabled) return;

        // Add user message to UI
        addMessage(message, 'user');
        userInput.value = '';
        userInput.style.height = 'auto';

        // Disable input while agent is thinking
        sendBtn.disabled = true;
        userInput.disabled = true;

        // Add thinking indicator
        const agentDiv = addMessage('Thinking...', 'agent');
        agentDiv.classList.add('thinking');
        let isFirstChunk = true;

        try {
            // Open SSE connection to /chat endpoint
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            // Read stream chunk by chunk
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // Parse SSE format: "data: {...}\n\n"
                const text = decoder.decode(value);
                const lines = text.split('\n');

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;

                    const data = JSON.parse(line.slice(6));

                    if (data.type === 'token') {
                        // First token — replace "Thinking..." with actual content
                        if (isFirstChunk) {
                            agentDiv.textContent = '';
                            agentDiv.classList.remove('thinking');
                            isFirstChunk = false;
                        }
                        // Add this check
                        const content = typeof data.content === 'string' 
                            ? data.content 
                            : JSON.stringify(data.content);
                        agentDiv.textContent += content;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }

                    if (data.type === 'error') {
                        agentDiv.textContent = 'Error: ' + data.content;
                        agentDiv.style.color = '#ff6b6b';
                    }
                }
            }

        } catch (err) {
            agentDiv.textContent = 'Connection error. Please try again.';
            agentDiv.style.color = '#ff6b6b';
        }

        // Re-enable input
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }

    async function clearMemory() {
        await fetch('/clear', { method: 'POST' });
        chatContainer.innerHTML = `
            <div class="message agent-message">
                Memory cleared. Starting fresh!
            </div>`;
    }
</script>

</body>
</html>
